[custom]
; 强制开启证书忽略，解决节点连接失败问题
tfo=true
scv=true
; 包含所有协议，防止 hy2 等节点丢失
include_protocol=trojan,hysteria2,ss,vless,vmess

; 规则集定义（保持不变）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/superfat1988/ClashRule/main/Direct.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/superfat1988/ClashRule/main/ProxyLite.list
ruleset=🤖 AI,https://raw.githubusercontent.com/qichiyuhub/rule/master/AI.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=📢 FCM,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GoogleFCM/GoogleFCM.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=👨🏿‍💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list
ruleset=🍀 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=📲 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL

; 策略组定义（优化匹配逻辑，兼容有无图标的情况）
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 香港故障转移`[]🔯 日本故障转移`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇸 美国节点`[]🌐 其他地区`[]🐸 手动切换`[]DIRECT

custom_proxy_group=📹 YouTube`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🤖 AI`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🌐 其他地区`[]🐸 手动切换
custom_proxy_group=🍀 Google`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇸 美国节点
custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇸 美国节点`[]🌐 其他地区
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇸 美国节点
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT`[]🐸 手动切换

; 基础节点过滤（修复匹配逻辑，防止过滤掉 hy2 节点）
custom_proxy_group=🐸 手动切换`select`^(?!.*(流量|过期|到期|官网|群|失联)).*
custom_proxy_group=🇭🇰 香港节点`select`(?=.*(香港|HK))^((?!(流量|过期|到期|官网|群|失联)).)*$
custom_proxy_group=🇹🇼 台湾节点`select`(?=.*(台湾|TW))^((?!(流量|过期|到期|官网|群|失联)).)*$
custom_proxy_group=🇯🇵 日本节点`select`(?=.*(日本|JP))^((?!(流量|过期|到期|官网|群|失联)).)*$
custom_proxy_group=🇸🇬 狮城节点`select`(?=.*(新加坡|SG|坡))^((?!(流量|过期|到期|官网|群|失联)).)*$
custom_proxy_group=🇺🇸 美国节点`select`(?=.*(美国|US))^((?!(流量|过期|到期|官网|群|失联)).)*$
custom_proxy_group=🌐 其他地区`select`(?=.*(英国|法国|澳大利亚|加拿大|西班牙|泰国|住宅|应急))^((?!(流量|过期|到期|官网|群|失联)).)*$

; 故障转移
custom_proxy_group=🔯 香港故障转移`fallback`(?=.*(香港|HK))^((?!(流量|过期|到期|官网|群|失联)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 日本故障转移`fallback`(?=.*(日本|JP))^((?!(流量|过期|到期|官网|群|失联)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*(流量|过期|到期|官网|群|失联)).*`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
